name: CI

on:
  push:
    branches: [main]
  pull_request:

# Only keep the latest run per branch/PR; cancel superseded ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, lint, VMTests, StateTests, and modern GeneralStateTests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Installs elan + the toolchain pinned in `lean-toolchain`, restores a
      # build cache, and fetches Mathlib's prebuilt olean cache so Mathlib is
      # never compiled from source on the runner.
      - name: Set up Lean and fetch Mathlib cache
        uses: leanprover/lean-action@v1

      - name: Build and fail on any linter warning
        run: |
          # Rebuild just this project's modules (Mathlib & other dependency
          # oleans live under .lake/packages and are left untouched), so the
          # linters re-emit their diagnostics, then fail if any appear.
          rm -rf .lake/build
          set -o pipefail
          lake build evm_semantics vmtests statetests gstatetests 2>&1 | tee build.log
          if grep -E "warning:" build.log; then
            echo "::error::Linter warnings detected — see the build log above."
            exit 1
          fi
          echo "Build succeeded with no linter warnings."

      # Runs the lint driver configured in `lakefile.toml`
      # (`batteries/runLinter EvmSemantics`) — the same driver Mathlib
      # uses for its own CI gate. It checks declarations missing
      # doc-strings, simp lemmas not in simp-normal-form, unused
      # arguments, dangerous instances, etc. Allow-listed findings live
      # in `scripts/nolints.json`; regenerate via `lake lint -- --update`.
      - name: Run `lake lint` (Batteries' `runLinter`)
        run: lake lint

      # Sparse + blobless fetch of just the VMTests corpus (~11 MB) rather than
      # the full ~2.7 GB legacytests checkout, pinned to the exact revision the
      # committed baseline was generated against. Bump CORPUS_REV together with
      # .github/vmtests-baseline.txt when refreshing the baseline, never alone —
      # otherwise the baseline would be compared against a different corpus.
      - name: Fetch VMTests corpus
        env:
          CORPUS_REV: 1f581b8ccdc4c63acf5f2c5c1b155c690c32a8eb
        run: |
          mkdir corpus && cd corpus
          git init -q
          git remote add origin https://github.com/ethereum/legacytests
          git sparse-checkout init --cone
          # VMTests (for the vmtests suite) + the GeneralStateTests
          # subdirs the statetests runner currently passes cleanly on
          # (no FAIL / no INCON / no CRASH). The full
          # `GeneralStateTests` tree is ~400 MB; this curated set is
          # ~70 MB. Add a dir here once the evaluator passes every
          # variant in it; keep a snapshot in `.github/statetests-baseline.txt`
          # so a regression flips one of the listed tests to FAIL.
          git sparse-checkout set \
            Constantinople/VMTests \
            Constantinople/BlockchainTests/GeneralStateTests/stArgsZeroOneBalance \
            Constantinople/BlockchainTests/GeneralStateTests/stAttackTest \
            Constantinople/BlockchainTests/GeneralStateTests/stBadOpcode \
            Constantinople/BlockchainTests/GeneralStateTests/stBugs \
            Constantinople/BlockchainTests/GeneralStateTests/stCallCodes \
            Constantinople/BlockchainTests/GeneralStateTests/stCallCreateCallCodeTest \
            Constantinople/BlockchainTests/GeneralStateTests/stCallDelegateCodesCallCodeHomestead \
            Constantinople/BlockchainTests/GeneralStateTests/stCallDelegateCodesHomestead \
            Constantinople/BlockchainTests/GeneralStateTests/stChangedEIP150 \
            Constantinople/BlockchainTests/GeneralStateTests/stCodeCopyTest \
            Constantinople/BlockchainTests/GeneralStateTests/stCodeSizeLimit \
            Constantinople/BlockchainTests/GeneralStateTests/stDelegatecallTestHomestead \
            Constantinople/BlockchainTests/GeneralStateTests/stEIP150Specific \
            Constantinople/BlockchainTests/GeneralStateTests/stEIP150singleCodeGasPrices \
            Constantinople/BlockchainTests/GeneralStateTests/stExample \
            Constantinople/BlockchainTests/GeneralStateTests/stHomesteadSpecific \
            Constantinople/BlockchainTests/GeneralStateTests/stInitCodeTest \
            Constantinople/BlockchainTests/GeneralStateTests/stLogTests \
            Constantinople/BlockchainTests/GeneralStateTests/stMemExpandingEIP150Calls \
            Constantinople/BlockchainTests/GeneralStateTests/stMemoryStressTest \
            Constantinople/BlockchainTests/GeneralStateTests/stMemoryTest \
            Constantinople/BlockchainTests/GeneralStateTests/stPreCompiledContracts \
            Constantinople/BlockchainTests/GeneralStateTests/stPreCompiledContracts2 \
            Constantinople/BlockchainTests/GeneralStateTests/stRandom \
            Constantinople/BlockchainTests/GeneralStateTests/stRecursiveCreate \
            Constantinople/BlockchainTests/GeneralStateTests/stRefundTest \
            Constantinople/BlockchainTests/GeneralStateTests/stShift \
            Constantinople/BlockchainTests/GeneralStateTests/stExtCodeHash \
            Constantinople/BlockchainTests/GeneralStateTests/stRevertTest \
            Constantinople/BlockchainTests/GeneralStateTests/stSStoreTest \
            Constantinople/BlockchainTests/GeneralStateTests/stSpecialTest \
            Constantinople/BlockchainTests/GeneralStateTests/stStackTests \
            Constantinople/BlockchainTests/GeneralStateTests/stTransactionTest \
            Constantinople/BlockchainTests/GeneralStateTests/stTransitionTest \
            Constantinople/BlockchainTests/GeneralStateTests/stZeroCallsRevert \
            Constantinople/BlockchainTests/GeneralStateTests/stCreateTest \
            Constantinople/BlockchainTests/GeneralStateTests/stEIP158Specific \
            Constantinople/BlockchainTests/GeneralStateTests/stNonZeroCallsTest \
            Constantinople/BlockchainTests/GeneralStateTests/stQuadraticComplexityTest \
            Constantinople/BlockchainTests/GeneralStateTests/stRandom2 \
            Constantinople/BlockchainTests/GeneralStateTests/stReturnDataTest \
            Constantinople/BlockchainTests/GeneralStateTests/stSolidityTest \
            Constantinople/BlockchainTests/GeneralStateTests/stStaticCall \
            Constantinople/BlockchainTests/GeneralStateTests/stSystemOperationsTest \
            Constantinople/BlockchainTests/GeneralStateTests/stZeroCallsTest \
            Constantinople/BlockchainTests/GeneralStateTests/stZeroKnowledge \
            Constantinople/BlockchainTests/GeneralStateTests/stZeroKnowledge2
          git fetch --depth 1 --filter=blob:none origin "$CORPUS_REV"
          git checkout -q FETCH_HEAD

      # Fetch the MAINTAINED ethereum/tests GeneralStateTests, which ship as a
      # single ~9 MB tarball (`fixtures_general_state_tests.tgz`) at the repo
      # root rather than as checked-in dirs. A blobless partial clone +
      # single-file sparse checkout downloads only that tarball; we then extract
      # a curated subset of `GeneralStateTests/*` dirs. Pin TESTS_REV together
      # with .github/gstatetests-baseline.txt, never alone.
      - name: Fetch modern GeneralStateTests corpus
        env:
          # tag v17.2
          TESTS_REV: c67e485ff8b5be9abc8ad15345ec21aa22e290d9
        run: |
          mkdir ethtests && cd ethtests
          git init -q
          git remote add origin https://github.com/ethereum/tests
          git sparse-checkout init
          # Sparse to the single tarball file (can't sparse *inside* a tarball,
          # so the whole ~9 MB blob still downloads — that's fine).
          git sparse-checkout set --no-cone fixtures_general_state_tests.tgz
          git fetch --depth 1 --filter=blob:none origin "$TESTS_REV"
          git checkout -q FETCH_HEAD
          # Extract the whole GeneralStateTests tree (in-archive prefix is
          # `GeneralStateTests/`, no `fixtures/` prefix), then drop the two dirs
          # that don't fit CI: `stTimeConsuming` (deliberately pathological —
          # ackermann/loops that would each eat the per-file wall cap) and the
          # non-GeneralStateTests internal `VMTests` dir. Everything else runs
          # under the per-file subprocess isolation in gstatetests_run.sh.
          mkdir -p ../gstcorpus
          tar xzf fixtures_general_state_tests.tgz -C ../gstcorpus GeneralStateTests
          rm -rf ../gstcorpus/GeneralStateTests/stTimeConsuming \
                 ../gstcorpus/GeneralStateTests/VMTests
          cd ..
          # Guard: a wrong in-archive path would silently extract nothing, the
          # runner would print `total 0`, the summary would find no aggregate
          # line and the comparison would be skipped as a false green. Fail loud.
          count=$(find gstcorpus -name '*.json' | wc -l)
          echo "Extracted $count GeneralStateTests json files."
          [ "$count" -gt 0 ] || { echo "::error::no GeneralStateTests extracted — check TESTS_REV / archive paths"; exit 1; }

      # Non-gating: this step reports the VMTests pass/fail picture and flags
      # regressions, but never blocks the PR. The known-failure baseline lives
      # in .github/vmtests-baseline.txt.
      - name: Run full VMTests suite
        continue-on-error: true
        run: |
          ./.lake/build/bin/vmtests corpus/Constantinople/VMTests \
            | tee vmtests-output.txt

      - name: Summarize and compare against baseline
        if: always()
        continue-on-error: true
        run: |
          # Only compare if a complete summary was produced. A failed/partial
          # vmtests run yields no parseable aggregate line, so vmtests_summary.sh
          # exits non-zero; in that case skip the comparison rather than diff an
          # empty summary (which would falsely report "no regressions, many
          # improvements").
          if .github/scripts/vmtests_summary.sh vmtests-output.txt > vmtests-summary.txt; then
            .github/scripts/vmtests_check.sh \
              .github/vmtests-baseline.txt vmtests-summary.txt | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=VMTests::vmtests produced no parseable summary; skipping regression comparison."
            {
              echo "## VMTests regression report"
              echo
              echo "⚠️ The vmtests run did not produce a parseable summary (incomplete run, missing output, or an output-format change), so the regression comparison was **skipped** to avoid false results. See the \`vmtests-report\` artifact."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload VMTests report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vmtests-report
          path: |
            vmtests-output.txt
            vmtests-summary.txt

      # Non-gating: reports the GeneralStateTests conformance picture against
      # the curated subset checked out above and flags regressions. The
      # known-state baseline lives in .github/statetests-baseline.txt.
      # Wrapped in `timeout` because the evaluator's functional world-state
      # maps make some calls slow; a hang must not block CI.
      - name: Run GeneralStateTests (curated subset)
        if: always()
        continue-on-error: true
        run: |
          # `statetests_run.sh` walks the dir tree via `find … -name '*.json'`,
          # so pointing it at the parent `GeneralStateTests` picks up every
          # subdir the sparse-checkout has materialised. Per-file wall-cap
          # (45s) + parallelism (4): bounds CI time despite the evaluator's
          # slow functional world-state maps. Deep-recursion tests that
          # exceed the cap are recorded as INCON (wall-timeout), never hang.
          .github/scripts/statetests_run.sh \
            corpus/Constantinople/BlockchainTests/GeneralStateTests 45 4 \
            | tee statetests-output.txt

      # GATING: this step fails the job if a previously-passing CALL test now
      # FAILs (id-level pass -> FAIL). It keys on the FAIL id set, not count
      # deltas, so a wall-timeout flip on a slow runner (pass/core -> incon)
      # does not fail the build. A crashed/partial run yields no parseable
      # summary and is reported (not gated) via the else branch.
      - name: Summarize and compare CALL state tests against baseline
        if: always()
        run: |
          if .github/scripts/statetests_summary.sh statetests-output.txt > statetests-summary.txt; then
            .github/scripts/statetests_check.sh --strict \
              .github/statetests-baseline.txt statetests-summary.txt | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=StateTests::statetests produced no parseable summary; skipping regression comparison."
            {
              echo "## StateTests (CALL) regression report"
              echo
              echo "⚠️ The statetests run did not produce a parseable summary (incomplete run, timeout, or an output-format change), so the regression comparison was **skipped**. See the \`statetests-report\` artifact."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload StateTests report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: statetests-report
          path: |
            statetests-output.txt
            statetests-summary.txt

      # Non-gating: reports the modern GeneralStateTests conformance picture
      # over (almost) the whole corpus and flags regressions. The known-state
      # baseline lives in .github/gstatetests-baseline.txt. Run via the per-file
      # subprocess-isolation wrapper (45s cap, parallelism 4): a panic/OOM in one
      # pathological test (the evaluator's unbounded huge-offset memory alloc) is
      # contained as a `crash` for that file instead of aborting the whole run.
      - name: Run modern GeneralStateTests
        if: always()
        continue-on-error: true
        run: |
          .github/scripts/gstatetests_run.sh \
            gstcorpus/GeneralStateTests 45 4 | tee gstatetests-output.txt

      - name: Summarize and compare modern GeneralStateTests against baseline
        if: always()
        continue-on-error: true
        run: |
          if .github/scripts/gstatetests_summary.sh gstatetests-output.txt > gstatetests-summary.txt; then
            .github/scripts/gstatetests_check.sh \
              .github/gstatetests-baseline.txt gstatetests-summary.txt | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=GeneralStateTests::gstatetests produced no parseable summary; skipping regression comparison."
            {
              echo "## GeneralStateTests (modern) regression report"
              echo
              echo "⚠️ The gstatetests run did not produce a parseable summary (incomplete run, timeout, or an output-format change), so the regression comparison was **skipped**. See the \`gstatetests-report\` artifact."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload GeneralStateTests report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gstatetests-report
          path: |
            gstatetests-output.txt
            gstatetests-summary.txt
