name = "evm_semantics"
version = "0.1.0"
defaultTargets = ["evm_semantics"]

# Enforce a 100-column line limit (comments and docstrings included) via
# Mathlib's text-based style linter
leanOptions = { weak.linter.style.longLine = true }

# Use Batteries' `runLinter` script as the lint driver (same approach as
# Mathlib's lakefile). `lake lint` will build and execute this driver
# against the modules listed in `lintDriverArgs`. The driver runs the
# `#lint` suite (Batteries' linters: simpNF, unused arguments, missing
# docs, ...) on every declaration whose root namespace matches the
# argument.
lintDriver = "batteries/runLinter"
lintDriverArgs = ["EvmSemantics"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.31.0"

[[lean_lib]]
name = "EvmSemantics"

[[lean_exe]]
name = "evm_semantics"
root = "Main"

[[lean_exe]]
name = "vmtests"
root = "tests.VMRunner"

[[lean_exe]]
name = "statetests"
root = "tests.StateTestRunner"

[[lean_exe]]
name = "gstatetests"
root = "tests.GeneralStateTestRunner"

[[lean_exe]]
name = "keccak_test"
root = "tests.KeccakTest"

[[lean_exe]]
name = "sha256_test"
root = "tests.Sha256Test"

[[lean_exe]]
name = "ripemd160_test"
root = "tests.Ripemd160Test"

[[lean_exe]]
name = "ecrecover_test"
root = "tests.EcrecoverTest"

[[lean_exe]]
name = "ecadd_ecmul_test"
root = "tests.EcaddEcmulTest"

[[lean_exe]]
name = "ecpairing_test"
root = "tests.EcpairingTest"

[[lean_exe]]
name = "blake2f_test"
root = "tests.Blake2fTest"

[[lean_exe]]
name = "bls12381_test"
root = "tests.Bls12381Test"

[[lean_exe]]
name = "ecrecover_bench"
root = "tests.EcrecoverBench"

[[lean_exe]]
name = "mpt_smoke"
root = "tests.MptSmoke"


